{% extends "base.html" %}
{% load static i18n %}

{% block content %}
<div class="page-wrapper">
  <section class="dark-bg text-center py-5">
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
          <div class="section-title mb-0">
            <h1 class="title" style="font-size: 1.75rem;">{{ post.title }}</h1>
            <p class="mb-0 text-white small mt-2">{{ post.created_at|date:"l, d F Y" }}</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="grey-bg py-5 text-start"
    {% if LANGUAGE_CODE == 'ar' %}
      dir="rtl" style="direction: rtl; text-align: right;"
    {% else %}
      dir="ltr" style="direction: ltr; text-align: left;"
    {% endif %}>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <article class="bg-white p-4 p-lg-5 shadow-sm">
            {% if post.cover_image %}
              <div class="mb-4">
                <img src="{{ post.cover_image.url }}" class="img-fluid w-100" style="max-height: 480px; object-fit: cover;" alt="{{ post.title }}">
              </div>
            {% endif %}
            <div class="blog-post-body">{{ post.content|safe }}</div>
            <div class="mt-4 pt-3 border-top">
              <a href="{% url 'posts_list' %}" class="btn btn-theme btn-radius">{% trans "Back to news" %}</a>
            </div>
          </article>
        </div>
      </div>
    </div>
  </section>
</div>

<style>
  .blog-post-body img { max-width: 100%; height: auto; }
  .blog-post-body p:last-child { margin-bottom: 0; }
</style>
{% endblock %}
